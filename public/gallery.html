<!DOCTYPE html>
<html>

<head>

<title>Temple Gallery</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/about.css">
<style>

/* Gallery Image */

.gallery-img{
width:100%;
height:230px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.gallery-img:hover{
transform:scale(1.05);
}

/* Category Heading */

.category-title{
margin-top:50px;
margin-bottom:20px;
color:#b65a00;
font-weight:bold;
text-align:center;
}
/* Masonry Layout */

.masonry{
column-count:4;
column-gap:15px;
}

@media(max-width:992px){
.masonry{
column-count:3;
}
}

@media(max-width:768px){
.masonry{
column-count:2;
}
}

@media(max-width:480px){
.masonry{
column-count:1;
}
}


/* Images */

.gallery-img{
width:100%;
margin-bottom:15px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.gallery-img:hover{
transform:scale(1.03);
}


/* Category title */

.category-title{
margin-top:50px;
margin-bottom:20px;
text-align:center;
color:#b65a00;
font-weight:bold;
}


/* Lightbox */

#lightbox{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.9);

display:none;

justify-content:center;
align-items:center;

z-index:1000;

}

#lightbox img{
max-width:90%;
max-height:90%;
}

/* Lightbox */

#lightbox{

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.9);

display:none;

justify-content:center;
align-items:center;

z-index:1000;

}

#lightbox img{

max-width:90%;
max-height:90%;

}

</style>

</head>

<body>

<div id="navbar"></div>
<section class="about-hero">

<div class="hero-overlay-box">

<h1>Gallery</h1>

</div>

</section>

<div class="container mt-5">

<div id="galleryContainer"></div>

</div>


<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
<img id="lightbox-img">
</div>


<div id="footer"></div>

<script src="js/include.js"></script>
<script src="js/gallery.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
function googleTranslateElementInit() {
new google.translate.TranslateElement({
pageLanguage: 'en',
includedLanguages: 'en,hi,mr,gu',
layout: google.translate.TranslateElement.InlineLayout.SIMPLE
}, 'google_translate_element');
}
</script>

<script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
