<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Atithi Niwas | Bijasan Mata Mandir</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/about.css">
<link rel="stylesheet" href="css/atithi.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
</head>

<body>

<div id="navbar"></div>


<!-- HERO -->
<section class="about-hero">

<div class="hero-overlay-box">

<h1>Temple Atithi Niwas</h1>

<p>Book your Comfortable Stay</p>

</div>

</section>

<!-- ROOM TYPES -->

<section class="container mt-5">

<h2 class="text-center mb-4">Room Types</h2>

<div class="row">

<div class="col-md-6">

<div class="room-card">

<h4>AC Room</h4>

<p>Comfortable air-conditioned rooms for families.</p>

<p class="price">₹800 / Night</p>

</div>

</div>

<div class="col-md-6">

<div class="room-card">

<h4>Non-AC Room</h4>

<p>Affordable stay for pilgrims and devotees.</p>

<p class="price">₹400 / Night</p>

</div>

</div>

</div>

</section>
<!--
<section class="container mt-5">

<h2 class="text-center mb-4">Room Availability Calendar</h2>

<div id="roomCalendar"></div>

</section>
-->
<!-- BOOKING FORM -->

<section class="container mt-5">

<h2 class="text-center mb-4">Book Your Stay</h2>

<form id="roomForm">

<div class="row">

<div class="col-md-6">

<label>Name</label>
<input type="text" id="name" class="form-control" required>

</div>

<div class="col-md-6">

<label>Mobile</label>
<input type="tel" id="mobile" class="form-control" pattern="[5-9]{1}[0-9]{9}" maxlength="10"  required>

</div>

</div>


<div class="row mt-3">

<div class="col-md-6">

<label>Email</label>
<input type="email" id="email" class="form-control" required>

</div>

<div class="col-md-6">

<label>Room Type</label>

<select id="roomType" class="form-control">

<option value="AC">AC Room</option>
<option value="Non-AC">Non AC Room</option>

</select>

</div>

</div>


<div class="row mt-3">

<div class="col-md-6">

<label>Check In</label>
<input type="text" id="checkin" class="form-control" required>

</div>

<div class="col-md-6">

<label>Check Out</label>
<input type="text" id="checkout" class="form-control" required>

</div>

</div>


<div class="row mt-3">

<div class="col-md-6">

<label>Rooms</label>
<input type="number" id="rooms" class="form-control" min="1" value="1" required>

</div>

<div class="col-md-6">

<label>Guests</label>
<input type="number" id="guests" class="form-control" min="1" value="1" required>

</div>

</div>


<div class="row mt-3">

<div class="col-md-6">

<label>Total Amount</label>
<input type="text" id="amount" class="form-control" readonly>

</div>

</div>


<div class="text-center mt-4">

<button type="submit" class="btn btn-primary">

Book Room

</button>

</div>

</form>

</section>


<div id="footer"></div>


<script src="js/include.js"></script>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="js/calendar.js"></script>
<script src="js/room.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
