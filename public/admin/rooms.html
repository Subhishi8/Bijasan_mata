<div>
    
<button class="logout" onclick="logout()">Logout</button>

<div class="main">

<h2 class="mb-4">Room Bookings</h2>


<!-- Total Rooms -->

<div class="row mb-4">

<div class="col-md-4">

<div class="stat-card">

<h6>Total Room Bookings</h6>

<h3 id="totalRooms">0</h3>

</div>

</div>

</div>


<!-- Search -->

<div class="row mb-3">

<div class="col-md-4">

<input
type="text"
id="searchRooms"
class="form-control"
placeholder="Search name or mobile"
>

</div>

</div>

<div class="stat-card mb-4">

<h5>Check Room Availability</h5>

<div class="row">

<div class="col-md-3">

<label>Check-in Date</label>
<input type="date" id="checkinDate" class="form-control">

</div>

<div class="col-md-3">

<label>Check-out Date</label>
<input type="date" id="checkoutDate" class="form-control">

</div>

<div class="col-md-3">

<label>Room Type</label>

<select id="roomType" class="form-control">

<option value="AC">AC</option>
<option value="Non-AC">Non-AC</option>

</select>

</div>

<div class="col-md-3 d-flex align-items-end">

<button id="checkRoomBtn" class="btn btn-primary w-100">

Check Availability

</button>

</div>

</div>

<br>

<h5 id="roomResult"></h5>

</div>
<a href="/api/export-rooms" class="btn btn-success mb-3">Export Room Bookings</a>
<!-- Table -->

<div class="table-container">

<table class="table table-striped">

<thead>

<tr>
<th>Name</th>
<th>Mobile</th>
<th>Room Type</th>
<th>Rooms</th>
<th>Guests</th>
<th>Checkin</th>
<th>Checkout</th>
<th>Amount</th>
</tr>

</thead>

<tbody id="roomTable"></tbody>

</table>

</div>
