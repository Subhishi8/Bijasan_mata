<!DOCTYPE html>
<html>

<head>

<title>Pooja Booking</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="css/about.css">
<link rel="stylesheet" href="css/pooja.css">

</head>

<body>

<div id="navbar"></div>
<section class="about-hero">

<div class="hero-overlay-box">

<h1>Online Pooja Booking</h1>

</div>

</section>
<div class="container mt-5">
<div class="row">


<!-- NAVRATRI POOJA -->

<div class="col-md-4">

<div class="pooja-card">

<h4>Navratri Special Pooja</h4>

<p class="price">₹1101</p>

<p>Special pooja during Navratri festival.</p>

<button onclick="openBooking('Navratri Special Pooja',1101)">
Book Now
</button>

</div>

</div>


<!-- DURGA AARTI -->

<div class="col-md-4">

<div class="pooja-card">

<h4>Durga Aarti</h4>

<p class="price">₹501</p>

<p>Evening aarti performed daily.</p>

<button onclick="openBooking('Durga Aarti',501)">
Book Now
</button>

</div>

</div>


<!-- RUDRABHISHEK -->

<div class="col-md-4">

<div class="pooja-card">

<h4>Rudrabhishek</h4>

<p class="price">₹2100</p>

<p>Special abhishek for prosperity.</p>

<button onclick="openBooking('Rudrabhishek',2100)">
Book Now
</button>

</div>

</div>

</div>

</div>



<!-- BOOKING MODAL -->

<!-- Pooja Booking Modal -->
<div id="bookingModal" class="pooja-modal">

<div class="pooja-modal-content">

<h3 id="poojaTitle"></h3>

<p class="pooja-price">Amount: ₹<span id="poojaAmount"></span></p>

<form id="poojaForm">

<div class="row">

<div class="col-md-6">
<input type="text" id="name" placeholder="Full Name" required>
</div>

<div class="col-md-6">
<input type="tel" id="mobile" placeholder="Mobile Number" pattern="[5-9]{1}[0-9]{9}" maxlength="10" required>
</div>

</div>

<div class="row mt-3">

<div class="col-md-6">
<input type="email" id="email" placeholder="Email">
</div>

<div class="col-md-6">
<input type="date" id="date" required>
</div>

</div>


<!-- Time Slot -->

<div class="mt-3">

<label>Select Time Slot</label>

<select id="timeSlot" required>

<option value="">Select Slot</option>

<option value="Morning 7:00 AM">Morning 7:00 AM</option>
<option value="Morning 9:00 AM">Morning 9:00 AM</option>
<option value="Afternoon 12:00 PM">Afternoon 12:00 PM</option>
<option value="Evening 6:00 PM">Evening 6:00 PM</option>
<option value="Evening 7:30 PM">Evening 7:30 PM</option>

</select>

</div>


<!-- Pooja Mode -->

<div class="mt-3">

<label>Pooja Mode</label>

<div class="pooja-mode">

<label>

<input type="radio" name="mode" value="In Temple" required>

Attend Pooja in Temple

</label>

<label>

<input type="radio" name="mode" value="Pandit Performs">

Pandit performs on your name

</label>

</div>

</div>


<input type="hidden" id="amount">


<div class="text-center mt-4">

<button type="submit" class="pooja-pay-btn">

Proceed to Payment

</button>

</div>

</form>

</div>

</div>

<div id="footer"></div>

<script src="js/include.js"></script>
<script src="js/pooja.js"></script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</body>

</html>
